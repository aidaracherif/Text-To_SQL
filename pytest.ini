[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Marqueurs personnalisés (pour pouvoir filtrer avec `pytest -m unit`)
markers =
    unit: tests unitaires rapides (avec mocks)
    api: tests des endpoints FastAPI
    slow: tests plus lents (> 1s)
